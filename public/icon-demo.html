<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: #faf6f1;
  color: #3c2a1e;
  padding: 40px;
}
h1 { font-size: 28px; margin-bottom: 8px; }
.sub { color: #7a5c3a; margin-bottom: 40px; }
.pack {
  background: #fff;
  border: 1px solid #e0d5c8;
  border-radius: 16px;
  padding: 28px;
  margin-bottom: 32px;
}
.pack h2 { font-size: 18px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px;
}
.item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 12px 8px;
  border-radius: 10px;
  border: 1px solid transparent;
  transition: 0.15s;
  cursor: default;
  text-align: center;
}
.item:hover { border-color: #c7a97a; background: #fdfaf5; }
.item svg { display: block; }
.item .label { font-size: 11px; color: #7a5c3a; line-height: 1.3; }
.ph { font-size: 28px; color: #5c3d2a; }
</style>
</head>
<body>

<h1>🧩 Porównanie stylów ikon</h1>
<p class="sub">Trzy biblioteki SVG — kliknij wybrany wariant, a wdrożę go na stronę.</p>

<!-- 1. Lucide -->
<div class="pack" id="lucide">
  <h2>
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#8B6B4A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
    Lucide Icons
    <span style="font-size:12px;color:#aaa;font-weight:400;">— minimalistyczne, cienkie linie</span>
  </h2>
  <div class="grid" id="lucide-grid"></div>
</div>

<!-- 2. Heroicons -->
<div class="pack" id="heroicons">
  <h2>
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#8B6B4A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
    Heroicons (Outline)
    <span style="font-size:12px;color:#aaa;font-weight:400;">— solidniejsze, 1.5px stroke</span>
  </h2>
  <div class="grid" id="heroicons-grid"></div>
</div>

<!-- 3. Phosphor -->
<div class="pack" id="phosphor">
  <h2>
    <i class="ph ph-note-pencil" style="font-size:24px;color:#8B6B4A"></i>
    Phosphor Icons
    <span style="font-size:12px;color:#aaa;font-weight:400;">— regularny, można zmienić weight</span>

// Phosphor - używamy tagów <i> z klasami phosphor
function phClass(name) {
  const map = {
    merge: 'ph-files',
    split: 'ph-arrow-bend-down-left',
    compress: 'ph-archive',
    rotate: 'ph-arrow-clockwise',
    crop: 'ph-crop',
    delete: 'ph-trash',
    extract: 'ph-arrow-square-up',
    reorder: 'ph-list-bullets',
    'add-page': 'ph-file-plus',
    edit: 'ph-pencil',
    'page-numbers': 'ph-list-numbers',
    watermark: 'ph-drop',
    redact: 'ph-eye-closed',
    flatten: 'ph-stack',
    metadata: 'ph-info',
    word: 'ph-file-text',
    wordtopdf: 'ph-file-arrow-up',
    jpgTopdf: 'ph-images',
    images: 'ph-image',
    excel: 'ph-table',
    excel2pdf: 'ph-table',
    ppt: 'ph-presentation',
    openoffice: 'ph-file-text',
    txt: 'ph-file-text',
    svg: 'ph-file-image',
    epub: 'ph-book',
    html: 'ph-file-code',
    html2pdf: 'ph-file-code',
    url: 'ph-globe',
    protect: 'ph-lock',
    unlock: 'ph-lock-open',
    sign: 'ph-signature',
    aichat: 'ph-robot',
    aisummary: 'ph-file-text',
    translate: 'ph-translate',
    ocr: 'ph-magnifying-glass',
    compare: 'ph-arrows-left-right',
    fillform: 'ph-check-square',
    pdfa: 'ph-archive',
    guide: 'ph-book-open',
    home: 'ph-house',
  };
  return map[name] || 'ph-file';
}

function renderGrid(containerId, type) {
  const grid = document.getElementById(containerId);
  tools.forEach(t => {
    const div = document.createElement('div');
    div.className = 'item';
    if (type === 'lucide') div.innerHTML = lucideSvg(lucideMap[t.id] || lucideFallback) + `<div class="label">${t.label}</div>`;
    else if (type === 'heroicons') div.innerHTML = heroSvg(heroMap[t.id] || heroFallback) + `<div class="label">${t.label}</div>`;
    else if (type === 'phosphor') div.innerHTML = `<i class="${phClass(t.id)} ph" style="font-size:28px;color:#5c3d2a"></i>` + `<div class="label">${t.label}</div>`;
    grid.appendChild(div);
  });
}

renderGrid('lucide-grid', 'lucide');
renderGrid('heroicons-grid', 'heroicons');
renderGrid('phosphor-grid', 'phosphor');
