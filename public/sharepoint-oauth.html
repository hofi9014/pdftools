<!DOCTYPE html>
<html>
<body>
<script>
try {
  var hash = window.location.hash.substring(1);
  var params = new URLSearchParams(hash);
  var token = params.get('access_token');
  if (token && window.opener) {
    window.opener.postMessage({ type: 'sharepoint-token', accessToken: token }, window.location.origin);
    window.close();
  }
} catch (e) {
  document.body.textContent = 'OAuth callback error: ' + e.message;
}
</script>
</body>
</html>
